<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 小导师</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/theme/monokai.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/python/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/closebrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/matchbrackets.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js"></script>
<style>
/* ============ Light Theme (default) ============ */
:root {
  --primary: #4f8cff;
  --primary-hover: #3a6fdf;
  --primary-light: #e8f0ff;
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #2d3748;
  --text-secondary: #718096;
  --border: #e2e8f0;
  --success: #48bb78;
  --warning: #ed8936;
  --danger: #f56565;
  --code-bg: #1e293b;
  --code-text: #e2e8f0;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --sidebar-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --mermaid-bg: #fafbfc;
  --hover-bg: rgba(0,0,0,0.04);
  --input-bg: #f5f7fb;
}

/* ============ Dark Theme ============ */
[data-theme="dark"] {
  --primary: #6b9fff;
  --primary-hover: #5a8de0;
  --primary-light: #1e2d4a;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --border: #334155;
  --success: #48bb78;
  --warning: #f59e0b;
  --danger: #f87171;
  --code-bg: #0f172a;
  --code-text: #e2e8f0;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --sidebar-gradient: linear-gradient(135deg, #4c1d95 0%, #5b21b6 100%);
  --mermaid-bg: #1a2332;
  --hover-bg: rgba(255,255,255,0.06);
  --input-bg: #1a2332;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  z-index: 10;
  flex-shrink: 0;
  transition: background 0.3s, border-color 0.3s;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { font-size: 26px; }
.header-title { font-size: 17px; font-weight: 700; color: var(--text); }
.header-subtitle { font-size: 11px; color: var(--text-secondary); }
.header-right { display: flex; align-items: center; gap: 8px; }

.student-badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--primary-light); color: var(--primary);
  padding: 5px 12px; border-radius: 18px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s;
}
.student-badge:hover { filter: brightness(0.95); }

.btn-icon {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--text);
}
.btn-icon:hover { background: var(--hover-bg); border-color: var(--primary); }

/* Main layout */
.main {
  flex: 1; display: flex; overflow: hidden; min-height: 0;
}

/* Sidebar */
.sidebar {
  width: 260px; background: var(--card);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 14px; gap: 12px;
  overflow-y: auto; flex-shrink: 0;
  transition: background 0.3s, border-color 0.3s;
}
.sidebar-section { display: flex; flex-direction: column; gap: 6px; }
.sidebar-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  color: var(--text-secondary); letter-spacing: 0.5px;
}
.progress-card {
  background: var(--sidebar-gradient);
  border-radius: var(--radius); padding: 14px; color: white;
}
.progress-card .label { font-size: 11px; opacity: 0.85; }
.progress-card .score { font-size: 32px; font-weight: 800; margin: 2px 0; }
.progress-card .sub { font-size: 11px; opacity: 0.75; }
.progress-bar-bg {
  background: rgba(255,255,255,0.25); border-radius: 6px;
  height: 6px; margin-top: 8px; overflow: hidden;
}
.progress-bar-fg {
  background: white; height: 100%; border-radius: 6px;
  transition: width 0.6s ease;
}

.topic-list { display: flex; flex-direction: column; gap: 4px; }
.topic-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 8px;
  background: var(--hover-bg); cursor: pointer; transition: all 0.2s;
  font-size: 12px;
}
.topic-item:hover { background: var(--primary-light); }
.topic-name { font-weight: 600; }
.topic-score { font-size: 11px; color: var(--primary); font-weight: 700; }

/* Chat area */
.chat-area {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 3px;
}

/* Message bubbles */
.msg {
  display: flex; gap: 8px; max-width: 85%;
  animation: fadeIn 0.3s ease;
  position: relative;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.msg.user .msg-avatar { background: var(--primary-light); }
.msg.assistant .msg-avatar { background: #fef3c7; }

.msg-body { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }

.msg-content {
  padding: 10px 14px; border-radius: var(--radius);
  line-height: 1.6; font-size: 13px;
  word-break: break-word;
}
.msg.user .msg-content {
  background: var(--primary); color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-content {
  background: var(--card); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
  transition: background 0.3s, border-color 0.3s;
}

/* Message action bar */
.msg-actions {
  display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
  padding: 0 4px;
}
.msg.assistant:hover .msg-actions { opacity: 1; }
.msg-action {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--card); cursor: pointer; font-size: 11px;
  color: var(--text-secondary); transition: all 0.15s;
}
.msg-action:hover { background: var(--hover-bg); color: var(--primary); border-color: var(--primary); }
.msg-action.copied { color: var(--success); border-color: var(--success); }

/* Code block wrapper */
.code-block-wrapper {
  position: relative; margin: 8px 0; border-radius: 8px; overflow: hidden;
}
.code-block-wrapper pre {
  margin: 0; border-radius: 0; padding: 12px 14px 12px 44px;
  background: var(--code-bg); color: var(--code-text);
  overflow-x: auto; font-size: 12px; line-height: 1.5;
}
.code-block-wrapper pre code { background: none; padding: 0; color: inherit; }
.code-run-btn {
  position: absolute; top: 6px; right: 6px;
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
  color: #a5d6ff; cursor: pointer; font-size: 11px; font-weight: 600;
  transition: all 0.15s; z-index: 2;
}
.code-run-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
.code-run-btn.running { opacity: 0.6; pointer-events: none; }
.code-run-btn.success { color: var(--success); border-color: var(--success); background: rgba(72,187,120,0.15); }
.code-run-btn.error { color: var(--danger); border-color: var(--danger); background: rgba(245,101,101,0.15); }

/* Code output inline */
.code-output {
  margin-top: -1px; padding: 8px 14px;
  background: var(--mermaid-bg); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 8px 8px;
  font-size: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
  color: var(--text-secondary); display: none;
}
.code-output.show { display: block; }
.code-output.success { color: var(--success); border-color: var(--success); }
.code-output.error { color: var(--danger); border-color: var(--danger); }

/* Markdown inside messages */
.msg-content h1, .msg-content h2, .msg-content h3 {
  margin: 10px 0 5px; font-size: 15px;
}
.msg-content h3 { font-size: 14px; }
.msg-content p { margin: 5px 0; }
.msg-content ul, .msg-content ol { margin: 5px 0; padding-left: 18px; }
.msg-content li { margin: 2px 0; }
.msg-content code {
  background: rgba(0,0,0,0.06); padding: 1px 5px;
  border-radius: 3px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 12px;
}
[data-theme="dark"] .msg-content code { background: rgba(255,255,255,0.1); }
.msg-content table {
  border-collapse: collapse; width: 100%; margin: 8px 0;
  font-size: 12px;
}
.msg-content th, .msg-content td {
  border: 1px solid var(--border); padding: 6px 10px;
  text-align: left;
}
.msg-content th { background: var(--hover-bg); font-weight: 700; }
.msg-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.msg-content blockquote {
  border-left: 3px solid var(--primary); padding-left: 10px;
  color: var(--text-secondary); margin: 6px 0;
}
.msg-content .mermaid {
  background: var(--mermaid-bg); border-radius: 8px;
  padding: 12px; margin: 8px 0; text-align: center;
}

/* Input area */
.input-area {
  padding: 12px 20px; background: var(--card);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
  transition: background 0.3s, border-color 0.3s;
}
.input-wrapper {
  flex: 1; position: relative;
  border: 2px solid var(--border); border-radius: var(--radius);
  background: var(--input-bg); transition: border-color 0.2s;
  display: flex; flex-direction: column;
}
.input-wrapper:focus-within { border-color: var(--primary); }
.input-wrapper textarea {
  width: 100%; border: none; background: transparent;
  padding: 10px 14px; font-size: 13px; font-family: inherit;
  resize: none; outline: none; line-height: 1.5;
  min-height: 44px; max-height: 140px;
  color: var(--text);
}
.code-input-toggle {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px; font-size: 11px; color: var(--text-secondary);
  cursor: pointer; user-select: none;
}
.code-input-toggle:hover { color: var(--primary); }
.code-input-toggle.active { color: var(--primary); font-weight: 600; }
.CodeMirror {
  height: auto; min-height: 60px; max-height: 200px;
  font-size: 13px; border-radius: 0 0 var(--radius) var(--radius);
}
.CodeMirror-scroll { min-height: 60px; max-height: 200px; }

.send-btn {
  width: 44px; height: 44px; border-radius: 12px;
  border: none; background: var(--primary); color: white;
  font-size: 18px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--primary-hover); transform: scale(1.04); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

/* Welcome screen */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px 20px; text-align: center;
  gap: 14px;
}
.welcome-icon { font-size: 56px; }
.welcome-title { font-size: 22px; font-weight: 800; }
.welcome-desc { font-size: 13px; color: var(--text-secondary); max-width: 380px; }
.welcome-topics {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  margin-top: 6px;
}
.welcome-chip {
  padding: 6px 14px; border-radius: 18px; border: 1px solid var(--border);
  background: var(--card); cursor: pointer; font-size: 12px;
  transition: all 0.2s; color: var(--text);
}
.welcome-chip:hover { border-color: var(--primary); color: var(--primary); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--card); border-radius: var(--radius);
  padding: 22px; width: 340px; box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column; gap: 14px;
}
.modal h3 { font-size: 17px; }
.modal label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.modal input, .modal select {
  width: 100%; padding: 9px 12px; border: 2px solid var(--border);
  border-radius: 8px; font-size: 13px; outline: none;
  font-family: inherit; transition: border-color 0.2s;
  background: var(--input-bg); color: var(--text);
}
.modal input:focus, .modal select:focus { border-color: var(--primary); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn {
  padding: 8px 18px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: var(--hover-bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }

/* Typing indicator */
.typing-dots { display: flex; gap: 3px; padding: 3px 0; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-secondary); animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* Toast */
.toast {
  position: fixed; top: 16px; right: 16px; z-index: 200;
  padding: 10px 18px; border-radius: 10px; font-size: 13px;
  color: white; animation: fadeIn 0.3s ease;
  box-shadow: var(--shadow-lg);
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .msg { max-width: 95%; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="header-logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.58 2 4 4.5 4 8v3c0 1.1.9 2 2 2h1v-2H6V8c0-1.5 2.5-3 6-3s6 1.5 6 3v3h-1v2h1c1.1 0 2-.9 2-2V8c0-3.5-3.58-6-8-6zM7 15c-1.1 0-2 .9-2 2v3c0 3.5 3.58 6 8 6s8-2.5 8-6v-3c0-1.1-.9-2-2-2h-1v2h1v3c0 1.5-2.5 3-6 3s-6-1.5-6-3v-3h1v-2H7z" fill="currentColor"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor"/><circle cx="15.5" cy="14" r="1.5" fill="currentColor"/></svg></span>
    <div>
      <div class="header-title">Python 小导师</div>
      <div class="header-subtitle">中小学生编程教学助手</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="toggleDarkMode()" title="切换暗色模式" id="darkModeBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <button class="btn-icon" onclick="refreshProgress()" title="刷新进度"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    <button class="student-badge" onclick="showStudentModal()" id="studentBadge">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span id="studentNameDisplay">设置学生信息</span>
    </button>
    <button class="btn-icon" onclick="clearChat()" title="清空对话"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
  </div>
</header>

<!-- Main -->
<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="progress-card" id="progressCard">
      <div class="label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg> 综合掌握程度</div>
      <div class="score" id="overallScore">--</div>
      <div class="sub" id="overallStats">设置学生信息后显示</div>
      <div class="progress-bar-bg"><div class="progress-bar-fg" id="progressBar" style="width:0%"></div></div>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> 知识点掌握</span>
      <div class="topic-list" id="topicList">
        <div class="topic-item" style="color:var(--text-secondary);font-size:11px;justify-content:center;">
          暂无学习数据
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 快速开始</span>
      <div class="topic-list">
        <div class="topic-item" onclick="sendQuick('我想学变量')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="4"/><text x="12" y="17" text-anchor="middle" font-size="12" fill="currentColor" stroke="none">x</text></svg> 变量</div>
        <div class="topic-item" onclick="sendQuick('我想学条件判断')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg> 条件判断</div>
        <div class="topic-item" onclick="sendQuick('我想学循环')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> 循环</div>
        <div class="topic-item" onclick="sendQuick('我想学列表')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> 列表</div>

  <div class="chat-area">

        <div class="welcome-icon"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C7.58 2 4 4.5 4 8v3c0 1.1.9 2 2 2h1v-2H6V8c0-1.5 2.5-3 6-3s6 1.5 6 3v3h-1v2h1c1.1 0 2-.9 2-2V8c0-3.5-3.58-6-8-6zM7 15c-1.1 0-2 .9-2 2v3c0 3.5 3.58 6 8 6s8-2.5 8-6v-3c0-1.1-.9-2-2-2h-1v2h1v3c0 1.5-2.5 3-6 3s-6-1.5-6-3v-3h1v-2H7z" fill="currentColor"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor"/><circle cx="15.5" cy="14" r="1.5" fill="currentColor"/></svg></div>
        <div class="welcome-title">欢迎来到 Python 小导师！</div>
        <div class="welcome-desc">
          我是你的 Python 编程教学助手，用简单有趣的方式帮你学习编程。
          先告诉我你的名字和年龄，然后选择想学的知识点吧！

          <span class="welcome-chip" onclick="showStudentModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> 先设置我的信息</span>

          <span class="welcome-chip" onclick="sendQuick('我想学列表')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> 列表</span>
          <span class="welcome-chip" onclick="sendQuick('我想学函数')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> 函数</span>

          <span style="font-size:10px;color:var(--text-secondary)">输入消息或代码</span>
          <span class="code-input-toggle" id="codeToggle" onclick="toggleCodeMode()">
            &lt;/&gt; 代码模式
          </span>

        <textarea id="userInput" rows="1" placeholder="输入你的问题或代码..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
          oninput="autoResize(this)"></textarea>

      <button class="send-btn" onclick="sendMessage()" id="sendBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>

</div>

<!-- Student Modal -->
<div class="modal-overlay" id="studentModal" style="display:none" onclick="if(event.target===this)hideStudentModal()">
  <div class="modal">
    <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> 学生信息</h3>
    <div>
      <label>你的名字</label>
      <input type="text" id="studentName" placeholder="例如：小明" maxlength="20">
    </div>
    <div>
      <label>你的年龄</label>
      <input type="number" id="studentAge" placeholder="例如：12" min="6" max="18">
    </div>
    <div>
      <label>编程基础</label>
      <select id="studentLevel">
        <option value="beginner">零基础 - 完全没学过编程</option>
        <option value="scratch">学过 Scratch - 有图形化编程基础</option>
        <option value="basic">学过一点 Python - 了解变量和基本语法</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideStudentModal()">取消</button>
      <button class="btn btn-primary" onclick="saveStudentInfo()">保存</button>
    </div>
  </div>
</div>

<script>
// ============ Configuration ============
// 从 URL 参数 ?api_url= 读取 API 地址（静态托管时使用）
// 为空时使用相对路径（同域部署），否则使用指定地址
const CONFIG = {
  API_BASE: new URLSearchParams(window.location.search).get('api_url') || '',
};
// 删除 api_url 参数末尾的 /
if (CONFIG.API_BASE.endsWith('/')) CONFIG.API_BASE = CONFIG.API_BASE.slice(0, -1);

// 检查后端是否可达
let backendConnected = false;

async function checkBackend() {
  try {
    const url = CONFIG.API_BASE ? `${CONFIG.API_BASE}/health` : '/health';
    const resp = await fetch(url, { signal: AbortSignal.timeout(3000) });
    backendConnected = resp.ok;
  } catch {
    backendConnected = false;
  }
  const banner = document.getElementById('offlineBanner');
  if (!backendConnected) {
    if (!banner) showOfflineBanner();
  } else {
    if (banner) banner.remove();
  }
}

function showOfflineBanner() {
  const existing = document.getElementById('offlineBanner');
  if (existing) return;
  const banner = document.createElement('div');
  banner.id = 'offlineBanner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#fef2f2;color:#991b1b;text-align:center;padding:10px 16px;font-size:14px;border-bottom:1px solid #fecaca;';
  const linkText = CONFIG.API_BASE
    ? `已配置 API：${CONFIG.API_BASE}`
    : '使用相对路径（需同域部署）';
  banner.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>后端服务未连接，部分功能不可用。${linkText}`;
  document.body.prepend(banner);
}

// 封装带 API_BASE 的 fetch
function apiFetch(path, options = {}) {
  const url = CONFIG.API_BASE ? `${CONFIG.API_BASE}${path}` : path;
  return fetch(url, options);
}

// ============ State ============
let student = { name: '', age: 0, level: 'beginner' };
let isStreaming = false;
let currentAssistantMsg = null;
let currentAssistantDiv = null;
let codeMirrorEditor = null;
let isCodeMode = false;
let lastUserMessage = '';

// ============ Init ============
mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
marked.setOptions({ breaks: true, gfm: true });

// Dark mode
const savedTheme = localStorage.getItem('python_tutor_theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
updateDarkModeBtn();

// Load saved student info
const saved = localStorage.getItem('python_tutor_student');
if (saved) {
  student = JSON.parse(saved);
  updateStudentDisplay();
  loadConversationHistory();
  setTimeout(refreshProgress, 500);
}

// ============ Dark Mode ============
function toggleDarkMode() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('python_tutor_theme', next);
  updateDarkModeBtn();
  // Toggle highlight.js dark theme
  document.getElementById('hljs-dark').disabled = (next !== 'dark');
}

function updateDarkModeBtn() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('darkModeBtn').innerHTML = isDark
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
}

// ============ Student Modal ============
function showStudentModal() {
  document.getElementById('studentName').value = student.name || '';
  document.getElementById('studentAge').value = student.age || '';
  document.getElementById('studentLevel').value = student.level || 'beginner';
  document.getElementById('studentModal').style.display = 'flex';
}
function hideStudentModal() { document.getElementById('studentModal').style.display = 'none'; }
function saveStudentInfo() {
  const oldName = student.name;
  student.name = document.getElementById('studentName').value.trim();
  student.age = parseInt(document.getElementById('studentAge').value) || 0;
  student.level = document.getElementById('studentLevel').value;
  if (!student.name) { showToast('请输入你的名字', 'error'); return; }
  localStorage.setItem('python_tutor_student', JSON.stringify(student));
  updateStudentDisplay();
  hideStudentModal();
  refreshProgress();
  if (student.name !== oldName || document.getElementById('welcomeScreen')) {
    const levelText = { beginner: '零基础', scratch: '学过Scratch', basic: '学过一点Python' }[student.level];
    sendMessage(`你好，我叫${student.name}，今年${student.age}岁，${levelText}，想开始学Python。`);
  }
}
function updateStudentDisplay() {
  if (student.name) {
    document.getElementById('studentNameDisplay').textContent = `${student.name} · ${student.age}岁`;
    document.getElementById('studentBadge').style.background = 'var(--primary-light)';
  }
}

// ============ Code Mode Toggle ============
function toggleCodeMode() {
  isCodeMode = !isCodeMode;
  const toggle = document.getElementById('codeToggle');
  const wrapper = document.getElementById('inputWrapper');
  const textarea = document.getElementById('userInput');
  if (isCodeMode) {
    toggle.classList.add('active'); toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> 代码模式 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="vertical-align:middle;margin-left:2px"><polyline points="20 6 9 17 4 12"/></svg>';
    textarea.style.display = 'none';
    if (!codeMirrorEditor) {
      codeMirrorEditor = CodeMirror(wrapper, {
        value: textarea.value, mode: 'python', theme: 'monokai',
        lineNumbers: true, matchBrackets: true, autoCloseBrackets: true,
        indentUnit: 4, tabSize: 4, lineWrapping: true,
        extraKeys: { 'Ctrl-Enter': () => sendMessage(), 'Cmd-Enter': () => sendMessage() }
      });
      codeMirrorEditor.on('change', () => { textarea.value = codeMirrorEditor.getValue(); });
    } else {
      codeMirrorEditor.setValue(textarea.value);
      codeMirrorEditor.getWrapperElement().style.display = '';
    }
    codeMirrorEditor.refresh(); codeMirrorEditor.focus();
  } else {
    toggle.classList.remove('active'); toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> 代码模式';
    if (codeMirrorEditor) {
      textarea.value = codeMirrorEditor.getValue();
      codeMirrorEditor.getWrapperElement().style.display = 'none';
    }
    textarea.style.display = ''; textarea.focus();
  }
}

// ============ Chat ============
function sendQuick(text) {
  if (isCodeMode && codeMirrorEditor) { codeMirrorEditor.setValue(text); }
  else { document.getElementById('userInput').value = text; }
  sendMessage();
}

async function sendMessage(overrideText) {
  if (isStreaming) return;
  let text;
  if (overrideText) { text = overrideText; }
  else if (isCodeMode && codeMirrorEditor) {
    text = codeMirrorEditor.getValue().trim();
    if (!text) return;
    codeMirrorEditor.setValue(''); document.getElementById('userInput').value = '';
  } else {
    const input = document.getElementById('userInput');
    text = input.value.trim(); if (!text) return;
    input.value = ''; input.style.height = 'auto';
  }

  lastUserMessage = text;
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();

  addMessage('user', text);
  document.getElementById('sendBtn').disabled = true;
  isStreaming = true;

  if (student.name) saveConversationMessage(student.name, 'user', text);

  const assistantDiv = addMessage('assistant', '');
  currentAssistantDiv = assistantDiv;
  const contentDiv = assistantDiv.querySelector('.msg-content');
  currentAssistantMsg = contentDiv;
  showTyping(contentDiv);

  let fullText = text;
  if (student.name) {
    fullText = `[学生: ${student.name}, ${student.age}岁, ${student.level === 'beginner' ? '零基础' : student.level === 'scratch' ? '学过Scratch' : '学过一点Python'}] ${text}`;
  }

  try {
    const response = await apiFetch('/stream_run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'query', session_id: student.name || 'anonymous',
        message: fullText,
        content: { query: { prompt: [{ type: 'text', content: { text: fullText } }] } }
      })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', fullContent = '', firstChunk = true;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n'); buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          let chunk = '';
          if (typeof data === 'string') { chunk = data; }
          else if (data.content) { chunk = typeof data.content === 'string' ? data.content : JSON.stringify(data.content); }
          else if (data.output) { chunk = typeof data.output === 'string' ? data.output : data.output.content || ''; }
          else if (data.messages) {
            const lastMsg = data.messages[data.messages.length - 1];
            if (lastMsg && lastMsg.content) { chunk = typeof lastMsg.content === 'string' ? lastMsg.content : ''; }
          }
          if (chunk && chunk.trim()) {
            if (firstChunk) { contentDiv.innerHTML = ''; firstChunk = false; }
            fullContent += chunk;
            contentDiv.innerHTML = renderMarkdown(fullContent);
            scrollToBottom();
          }
        } catch (e) {}
      }
    }

    if (firstChunk) contentDiv.innerHTML = '<span style="color:var(--text-secondary)">（未收到回复，请重试）</span>';

    if (student.name && fullContent) saveConversationMessage(student.name, 'assistant', fullContent);

    // Post-process: add run buttons, render mermaid, highlight code
    await postProcessMessage(contentDiv);
    addMessageActions(assistantDiv, fullContent);

    if (student.name) setTimeout(refreshProgress, 2000);

  } catch (err) {
    contentDiv.innerHTML = `<span style="color:var(--danger)">连接失败: ${err.message}<br>请检查网络后重试</span>`;
  } finally {
    isStreaming = false; currentAssistantMsg = null; currentAssistantDiv = null;
    document.getElementById('sendBtn').disabled = false;
    if (!isCodeMode) document.getElementById('userInput').focus();

// 检查后端连接状态
checkBackend();
  }
}

function addMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user'
    ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
    : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C7.58 2 4 4.5 4 8v3c0 1.1.9 2 2 2h1v-2H6V8c0-1.5 2.5-3 6-3s6 1.5 6 3v3h-1v2h1c1.1 0 2-.9 2-2V8c0-3.5-3.58-6-8-6zM7 15c-1.1 0-2 .9-2 2v3c0 3.5 3.58 6 8 6s8-2.5 8-6v-3c0-1.1-.9-2-2-2h-1v2h1v3c0 1.5-2.5 3-6 3s-6-1.5-6-3v-3h1v-2H7z" fill="currentColor"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor"/><circle cx="15.5" cy="14" r="1.5" fill="currentColor"/></svg>';
  const avatarBg = role === 'user' ? 'var(--primary-light)' : '#fef3c7';
  div.innerHTML = `
    <div class="msg-avatar" style="background:${avatarBg}">${avatar}</div>
    <div class="msg-body">
      <div class="msg-content">${role === 'user' ? escapeHtml(text) : ''}</div>
      ${role === 'assistant' ? '<div class="msg-actions"></div>' : ''}
    </div>
  `;
  container.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping(contentDiv) {
  contentDiv.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
}

// ============ Post-process: Run Buttons ============
function renderMarkdown(text) {
  let html = marked.parse(text);
  html = html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
    '<div class="mermaid">$1</div>');
  return html;
}

async function postProcessMessage(contentDiv) {
  // Wrap python code blocks with run button
  const pres = contentDiv.querySelectorAll('pre');
  pres.forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;
    const cls = code.className || '';
    const isPython = cls.includes('python') || cls.includes('language-python') ||
      (!cls && code.textContent && (code.textContent.includes('print(') || code.textContent.includes('def ') || code.textContent.includes('for ') || code.textContent.includes('import ')));
    if (!isPython) return;

    // Wrap in code-block-wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);

    // Add run button
    const btn = document.createElement('button');
    btn.className = 'code-run-btn';
    btn.innerHTML = '▶ 运行';
    btn.title = '点击运行此代码';
    btn.onclick = function() { runCodeBlock(code.textContent, btn, wrapper); };
    wrapper.appendChild(btn);
  });

  // Render mermaid
  await renderMermaidDiagrams(contentDiv);

  // Highlight code
  contentDiv.querySelectorAll('pre code').forEach(block => {
    try { hljs.highlightElement(block); } catch(e) {}
  });
}

async function runCodeBlock(code, btn, wrapper) {
  if (btn.classList.contains('running')) return;
  btn.classList.add('running');
  btn.innerHTML = '⏳ 运行中...';

  // Remove old output
  const oldOutput = wrapper.querySelector('.code-output');
  if (oldOutput) oldOutput.remove();

  try {
    const resp = await apiFetch('/api/run_code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, stdin_input: '' })
    });
    const result = await resp.json();

    btn.classList.remove('running');

    // Create output element
    const output = document.createElement('div');
    output.className = 'code-output show';

    if (result.success && !result.error) {
      btn.classList.add('success');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="vertical-align:middle;margin-right:3px"><polyline points="20 6 9 17 4 12"/></svg> 成功';
      output.classList.add('success');
      output.textContent = result.output || '(无输出)';
      setTimeout(() => { btn.classList.remove('success'); btn.innerHTML = '▶ 运行'; }, 2000);
    } else {
      btn.classList.add('error');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="vertical-align:middle;margin-right:3px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> 错误';
      output.classList.add('error');
      output.textContent = result.error || result.friendly_error || '未知错误';
      if (result.friendly_error) output.textContent += '\n提示: ' + result.friendly_error;
      setTimeout(() => { btn.classList.remove('error'); btn.innerHTML = '▶ 运行'; }, 3000);
    }

    wrapper.appendChild(output);
  } catch (e) {
    btn.classList.remove('running');
    btn.classList.add('error');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="vertical-align:middle;margin-right:3px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> 失败';
    const output = document.createElement('div');
    output.className = 'code-output show error';
    output.textContent = '网络请求失败: ' + e.message;
    wrapper.appendChild(output);
    setTimeout(() => { btn.classList.remove('error'); btn.innerHTML = '▶ 运行'; }, 3000);
  }
}

// ============ Message Actions ============
function addMessageActions(msgDiv, content) {
  const actionsDiv = msgDiv.querySelector('.msg-actions');
  if (!actionsDiv) return;

  // Copy button
  const copyBtn = document.createElement('button');
  copyBtn.className = 'msg-action';
  copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
  copyBtn.title = '复制回复内容';
  copyBtn.onclick = function() {
    navigator.clipboard.writeText(content).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
      setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制'; }, 2000);
    }).catch(() => showToast('复制失败', 'error'));
  };
  actionsDiv.appendChild(copyBtn);

  // Regenerate button
  const regenBtn = document.createElement('button');
  regenBtn.className = 'msg-action';
  regenBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> 重新生成';
  regenBtn.title = '重新生成回复';
  regenBtn.onclick = async function() {
    if (isStreaming) return;
    // Remove this message and the user message before it
    const container = document.getElementById('chatMessages');
    const prevMsg = msgDiv.previousElementSibling;
    if (prevMsg && prevMsg.classList.contains('msg') && prevMsg.classList.contains('user')) {
      prevMsg.remove();
    }
    msgDiv.remove();

    // Delete from backend
    if (student.name) {
      try {
        await apiFetch('/api/regenerate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: student.name, last_user_message: lastUserMessage })
        });
      } catch(e) {}
    }

    // Re-send
    sendMessage(lastUserMessage);
  };
  actionsDiv.appendChild(regenBtn);
}

// ============ Mermaid ============
async function renderMermaidDiagrams(container) {
  const mermaidBlocks = container.querySelectorAll('.mermaid');
  for (const block of mermaidBlocks) {
    if (block.getAttribute('data-processed')) continue;
    try {
      const id = 'mermaid-' + Math.random().toString(36).slice(2, 8);
      const { svg } = await mermaid.render(id, block.textContent);
      block.innerHTML = svg;
      block.setAttribute('data-processed', 'true');
    } catch (e) {
      block.innerHTML = `<pre style="color:var(--danger)">图表渲染失败: ${e.message}</pre>`;
    }
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function scrollToBottom() {
  const container = document.getElementById('chatMessages');
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ============ Conversation Persistence ============
async function saveConversationMessage(studentId, role, content) {
  try {
    await apiFetch('/api/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: studentId, role, content })
    });
  } catch(e) {}
}

async function loadConversationHistory() {
  if (!student.name) return;
  try {
    const resp = await apiFetch(`/api/conversations/${encodeURIComponent(student.name)}?limit=50`);
    if (!resp.ok) return;
    const data = await resp.json();
    if (!data.messages || data.messages.length === 0) return;

    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();

    const container = document.getElementById('chatMessages');
    for (let i = 0; i < data.messages.length; i++) {
      const msg = data.messages[i];
      const div = document.createElement('div');
      div.className = `msg ${msg.role}`;
      const avatar = msg.role === 'user'
        ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
        : '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C7.58 2 4 4.5 4 8v3c0 1.1.9 2 2 2h1v-2H6V8c0-1.5 2.5-3 6-3s6 1.5 6 3v3h-1v2h1c1.1 0 2-.9 2-2V8c0-3.5-3.58-6-8-6zM7 15c-1.1 0-2 .9-2 2v3c0 3.5 3.58 6 8 6s8-2.5 8-6v-3c0-1.1-.9-2-2-2h-1v2h1v3c0 1.5-2.5 3-6 3s-6-1.5-6-3v-3h1v-2H7z" fill="currentColor"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor"/><circle cx="15.5" cy="14" r="1.5" fill="currentColor"/></svg>';
      const avatarBg = msg.role === 'user' ? 'var(--primary-light)' : '#fef3c7';
      const content = msg.role === 'user' ? escapeHtml(msg.content) : renderMarkdown(msg.content);
      div.innerHTML = `
        <div class="msg-avatar" style="background:${avatarBg}">${avatar}</div>
        <div class="msg-body">
          <div class="msg-content">${content}</div>
          ${msg.role === 'assistant' ? '<div class="msg-actions"></div>' : ''}
        </div>
      `;
      container.appendChild(div);

      if (msg.role === 'user') {
        lastUserMessage = msg.content;
      }

      if (msg.role === 'assistant') {
        const contentDiv = div.querySelector('.msg-content');
        await postProcessMessage(contentDiv);
        addMessageActions(div, msg.content);
      }
    }
    scrollToBottom();
  } catch(e) { console.error('Failed to load history:', e); }
}

// ============ Progress Sidebar ============
async function refreshProgress() {
  if (!student.name) return;
  try {
    const resp = await apiFetch(`/api/progress/${encodeURIComponent(student.name)}`);
    if (!resp.ok) return;
    const data = await resp.json();

    document.getElementById('overallScore').textContent = data.overall_mastery;
    document.getElementById('progressBar').style.width = data.overall_mastery + '%';
    if (data.total_exercises > 0) {
      document.getElementById('overallStats').textContent = `${data.total_exercises} 题练习 · ${data.total_correct} 题正确`;
    } else {
      document.getElementById('overallStats').textContent = '开始学习后显示';
    }

    const topicList = document.getElementById('topicList');
    if (!data.topics || data.topics.length === 0) {
      topicList.innerHTML = '<div class="topic-item" style="color:var(--text-secondary);font-size:11px;justify-content:center;">暂无学习数据</div>';
      return;
    }

    topicList.innerHTML = data.topics.map(t => `
      <div class="topic-item" onclick="sendQuick('我想复习${t.topic_cn}')" title="点击复习">
        <span class="topic-name">${t.topic_cn}</span>
        <span class="topic-score">${t.mastery_level}%</span>
      </div>
    `).join('');
  } catch(e) { console.error('Failed to refresh progress:', e); }
}

// ============ Toast ============
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============ Keyboard ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideStudentModal();
});

document.getElementById('userInput').focus();
